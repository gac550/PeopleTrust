<!doctype html>
<html lang="es-CL">
<head>
<meta charset="utf-8" /><meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover" />
<title>Maqueta G · Hume voz-first · PeopleTrust</title>
<script src="https://cdn.tailwindcss.com"></script>
<style>
*{-webkit-tap-highlight-color:transparent}html,body{background:#fafafa;color:#0a0a0a;font-family:'Inter',sans-serif;margin:0;min-height:100svh;}
.btn-mega{width:200px;height:200px;border-radius:50%;background:#0a0a0a;color:#fff;display:grid;place-items:center;cursor:pointer;border:none;transition:.3s;box-shadow:0 24px 60px rgba(0,0,0,.2);position:relative;}
.btn-mega:hover{transform:scale(1.04);background:#171717;}
.btn-mega .ring{position:absolute;inset:-12px;border-radius:50%;border:2px solid #a855f7;opacity:.5;animation:pulse 2.4s infinite;}
.btn-mega .ring:nth-child(2){animation-delay:.8s;opacity:.3;}
@keyframes pulse{from{transform:scale(.96);opacity:.6}to{transform:scale(1.15);opacity:0}}
.wave{display:flex;align-items:flex-end;gap:4px;height:32px;}
.wave span{display:block;width:3px;background:#a855f7;border-radius:2px;animation:w 1.2s ease-in-out infinite;}
.wave span:nth-child(1){height:30%;animation-delay:0s}
.wave span:nth-child(2){height:60%;animation-delay:.1s}
.wave span:nth-child(3){height:90%;animation-delay:.2s}
.wave span:nth-child(4){height:50%;animation-delay:.3s}
.wave span:nth-child(5){height:75%;animation-delay:.4s}
@keyframes w{0%,100%{transform:scaleY(.4)}50%{transform:scaleY(1)}}
</style>
</head>
<body class="flex flex-col">
<header class="px-6 py-4 flex justify-between items-center">
<div class="flex items-center gap-2"><div class="w-7 h-7 rounded-md" style="background:linear-gradient(135deg,#a855f7,#7c3aed)"></div><span class="font-semibold">PeopleTrust</span></div>
<a href="https://argos.vecttore.com" class="text-sm font-medium hover:underline">Login</a>
</header>

<main class="flex-1 flex flex-col items-center justify-center px-6">
<p class="text-xs uppercase tracking-[0.3em] text-neutral-500 mb-12">Voz Valentina · plan Pro</p>

<button class="btn-mega" onclick="document.getElementById('hint').style.display='block'">
<span class="ring"></span>
<span class="ring"></span>
<div class="text-center">
<svg width="40" height="40" viewBox="0 0 24 24" fill="none" stroke="#fff" stroke-width="1.8" class="mx-auto mb-2"><path d="M12 1a3 3 0 0 0-3 3v8a3 3 0 0 0 6 0V4a3 3 0 0 0-3-3z"/><path d="M19 10v2a7 7 0 0 1-14 0v-2"/><line x1="12" y1="19" x2="12" y2="23"/></svg>
<div class="text-sm font-medium">Hablá conmigo</div>
</div>
</button>

<div class="mt-10 wave"><span></span><span></span><span></span><span></span><span></span></div>

<p id="hint" class="hidden mt-8 text-sm text-neutral-600 max-w-sm text-center">
Voz natural de Valentina (ElevenLabs) viene con plan Pro. <br/>
Mientras tanto, podés <a href="A.html" class="underline font-medium text-black">conversar por texto gratis</a>.
</p>

<div class="mt-16 text-center">
<p class="text-xs text-neutral-500 mb-3">o si preferís escribir</p>
<a href="A.html" class="inline-block px-6 py-2.5 rounded-xl border border-neutral-300 hover:bg-neutral-100 text-sm font-medium">Chat con Valentina (gratis) →</a>
</div>
</main>

<footer class="px-6 py-6 text-center text-xs text-neutral-500">
PeopleTrust 2026 · texto siempre gratis · voz con plan Pro
</footer>
</body></html>
