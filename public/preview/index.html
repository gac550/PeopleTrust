<!doctype html>
<html lang="es-CL">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
<title>Maquetas · PeopleTrust preview</title>
<meta http-equiv="Cache-Control" content="no-store, no-cache, must-revalidate, max-age=0" />
<meta http-equiv="Pragma" content="no-cache" />
<meta http-equiv="Expires" content="0" />
<base href="/preview/" />
<!-- TD-05 anti-FOUC · default LIGHT (mandato user 2026-05-21) -->
<script>document.documentElement.dataset.theme=localStorage.getItem('pt-theme')||'light'</script>
<script src="https://cdn.tailwindcss.com"></script>
<style>
:root[data-theme="dark"]  { --bg:#070612; --fg:#e5e3f0; --muted:#94a3b8; --accent:#a855f7; --card:rgba(255,255,255,.04); --border:rgba(255,255,255,.10); --hover:rgba(255,255,255,.06); }
:root[data-theme="light"] { --bg:#fafafa; --fg:#0f172a; --muted:#64748b; --accent:#7c3aed; --card:#ffffff;       --border:#e2e8f0;            --hover:#f1f5f9; }
*{-webkit-tap-highlight-color:transparent;box-sizing:border-box}
html,body{height:100%;margin:0;background:var(--bg);color:var(--fg);font-family:'Inter','system-ui',sans-serif;overflow:hidden;transition:background-color .2s,color .2s;}
header.shell{background:var(--card);border-bottom:1px solid var(--border);}
.tab{position:relative;cursor:pointer;user-select:none;color:var(--muted);background:transparent;border:none;height:48px;width:44px;display:inline-grid;place-items:center;font:600 14px/1 'JetBrains Mono','SF Mono',ui-monospace,monospace;flex-shrink:0;transition:color .15s,background .15s;}
.tab:hover{color:var(--fg);background:var(--hover);}
.tab.active{color:var(--fg);}
.tab.active::after{content:'';position:absolute;left:6px;right:6px;bottom:0;height:2px;background:var(--accent);border-radius:2px 2px 0 0;}
.iconbtn{width:36px;height:36px;border-radius:8px;border:none;background:transparent;color:var(--muted);display:grid;place-items:center;cursor:pointer;transition:.15s;}
.iconbtn:hover{color:var(--fg);background:var(--hover);}
iframe{display:block;width:100%;height:100%;border:0;background:var(--bg);transition:background .2s;}
.frame-wrap{height:calc(100vh - 49px);height:calc(100svh - 49px);position:relative;}
.tabs-row{scrollbar-width:none;}
.tabs-row::-webkit-scrollbar{display:none;}
.dot{width:6px;height:6px;border-radius:50%;background:#22c55e;display:inline-block;margin-left:6px;animation:pulse 2s infinite;}
@keyframes pulse{50%{opacity:.3}}
</style>
</head>
<body>

<!-- HEADER -->
<header class="shell sticky top-0 z-50 h-12 flex items-center px-2 sm:px-3 gap-1">

  <!-- Brand -->
  <span class="font-bold text-xs sm:text-sm tracking-tight flex-shrink-0 px-2 hidden sm:inline">PT · preview</span>

  <!-- Tabs sólo letras (escalable a miles) -->
  <nav class="tabs-row flex items-center flex-1 overflow-x-auto" id="tabs" aria-label="Maquetas">
    <button class="tab active" data-src="A.html" data-label="A" title="A · Pi.ai chat">A</button>
    <button class="tab" data-src="B.html" data-label="B" title="B · Apple cinemática">B</button>
    <button class="tab" data-src="C.html" data-label="C" title="C · Linear bento">C</button>
    <button class="tab" data-src="D.html" data-label="D" title="D · Stripe mesh">D</button>
    <button class="tab" data-src="E.html" data-label="E" title="E · ChatGPT minimal">E</button>
    <button class="tab" data-src="F.html" data-label="F" title="F · Character galería">F</button>
    <button class="tab" data-src="G.html" data-label="G" title="G · Hume voz-first">G</button>
    <button class="tab" data-src="H.html" data-label="H" title="H · Notion cálido">H</button>
    <button class="tab" data-src="I.html" data-label="I" title="I · Replicate demo">I</button>
    <button class="tab" data-src="J.html" data-label="J" title="J · híbrido scroll">J</button>
    <button class="tab" data-src="K.html" data-label="K" title="K · combinada J+H+G+A (humanizada)">K</button>
  </nav>

  <!-- Tools right -->
  <div class="flex items-center gap-1 flex-shrink-0 pr-1">
    <!-- Theme toggle (TD-02) -->
    <button id="themeBtn" class="iconbtn" aria-label="Cambiar tema" title="Cambiar tema claro/oscuro">
      <svg id="iconSun" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="display:none"><circle cx="12" cy="12" r="5"/><line x1="12" y1="1" x2="12" y2="3"/><line x1="12" y1="21" x2="12" y2="23"/><line x1="4.22" y1="4.22" x2="5.64" y2="5.64"/><line x1="18.36" y1="18.36" x2="19.78" y2="19.78"/><line x1="1" y1="12" x2="3" y2="12"/><line x1="21" y1="12" x2="23" y2="12"/><line x1="4.22" y1="19.78" x2="5.64" y2="18.36"/><line x1="18.36" y1="5.64" x2="19.78" y2="4.22"/></svg>
      <svg id="iconMoon" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/></svg>
    </button>
    <!-- Reload cache-bust -->
    <button id="reloadBtn" class="iconbtn" aria-label="Recargar maqueta" title="Recargar maqueta (cache-bust)">
      <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="23 4 23 10 17 10"/><polyline points="1 20 1 14 7 14"/><path d="M3.51 9a9 9 0 0 1 14.85-3.36L23 10M1 14l4.64 4.36A9 9 0 0 0 20.49 15"/></svg>
    </button>
    <!-- Open full -->
    <a id="openTab" href="A.html" target="_blank" rel="noopener" class="iconbtn" title="Abrir maqueta en pestaña nueva" aria-label="Abrir full">
      <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M18 13v6a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h6"/><polyline points="15 3 21 3 21 9"/><line x1="10" y1="14" x2="21" y2="3"/></svg>
    </a>
  </div>

</header>

<!-- FRAME -->
<div class="frame-wrap">
  <iframe id="frame" src="A.html" title="Maqueta" allow="microphone *"></iframe>
</div>

<script>
const frame   = document.getElementById('frame');
const tabs    = document.querySelectorAll('.tab');
const openTab = document.getElementById('openTab');
const themeBtn = document.getElementById('themeBtn');
const reloadBtn = document.getElementById('reloadBtn');
const iconSun = document.getElementById('iconSun');
const iconMoon = document.getElementById('iconMoon');

// === Theme (TD-01..TD-08) ===
function getTheme(){ return document.documentElement.dataset.theme || 'dark'; }
function setTheme(t){
  document.documentElement.dataset.theme = t;
  localStorage.setItem('pt-theme', t);
  iconSun.style.display  = t === 'dark'  ? 'inline' : 'none';
  iconMoon.style.display = t === 'light' ? 'inline' : 'none';
  // Re-cargar iframe con nuevo theme query
  if(frame.src) reloadFrame();
}
themeBtn.addEventListener('click', () => setTheme(getTheme() === 'dark' ? 'light' : 'dark'));
setTheme(getTheme());  // sync iconos al boot

// === Tabs + frame ===
function reloadFrame(){
  const current = (frame.src || '').split('?')[0].split('/').pop() || 'A.html';
  frame.src = `${current}?theme=${getTheme()}&v=${Date.now()}`;
}

function setActive(src, label){
  frame.src = `${src}?theme=${getTheme()}&v=${Date.now()}`;
  openTab.href = `${src}?theme=${getTheme()}`;
  tabs.forEach(t => t.classList.toggle('active', t.dataset.src === src));
  history.replaceState(null, '', `#${label}`);
  document.title = `${label} · maquetas PT`;
  const active = document.querySelector('.tab.active');
  if(active) active.scrollIntoView({behavior:'smooth', inline:'center', block:'nearest'});
}

tabs.forEach(t => t.addEventListener('click', () => setActive(t.dataset.src, t.dataset.label)));
reloadBtn.addEventListener('click', reloadFrame);

// Hash deeplink
const initial = (location.hash || '#A').replace('#','').toUpperCase();
const initialTab = [...tabs].find(t => t.dataset.label === initial);
if(initialTab) setActive(initialTab.dataset.src, initialTab.dataset.label);

// Keyboard ← →
document.addEventListener('keydown', e => {
  if(e.target.tagName === 'INPUT' || e.target.tagName === 'TEXTAREA') return;
  const idx = [...tabs].findIndex(t => t.classList.contains('active'));
  if(e.key === 'ArrowRight' && idx < tabs.length-1){ const n = tabs[idx+1]; setActive(n.dataset.src, n.dataset.label); }
  if(e.key === 'ArrowLeft'  && idx > 0)            { const p = tabs[idx-1]; setActive(p.dataset.src, p.dataset.label); }
});
</script>
</body></html>
